logLevel: debug
host: "0.0.0.0"
port: 8080

healthCheckTimeout: 400
globalTTL: 1800

matrix:
  vars:
    qw7: "Qwen/Qwen2.5-Coder-7B-Instruct"
    qw35: "Qwen/Qwen3.6-35B-A3B-FP8"
    nomic: "nomic-ai/nomic-embed-text-v1.5"

  evict_costs:
    qw7: 10
    qw35: 30
    nomic: 1

  sets:
    coder_suite: "(qw7 | qw35) & nomic"

hooks:
  on_startup:
    preload: ["nomic-ai/nomic-embed-text-v1.5", "Qwen/Qwen3.6-35B-A3B-FP8"]

models:
  "Qwen/Qwen2.5-Coder-7B-Instruct":
    checkEndpoint: /v1/models
    cmd: |
      docker run --rm --runtime=nvidia \
      --gpus '"device=0"' \
      --network llm-network \
      --name vllm-${PORT} \
      -v ${env.HF_HOME}:/root/.cache/huggingface \
      vllm/vllm-openai:latest \
        --model Qwen/Qwen2.5-Coder-7B-Instruct \
        --port ${PORT} \
        --host 0.0.0.0
    cmdStop: "docker stop vllm-${PORT} || true"
    proxy: http://vllm-${PORT}:${PORT}
    type: proxy

  "Qwen/Qwen3.6-35B-A3B-FP8":
    checkEndpoint: /v1/models
    cmd: >
      docker run --rm --runtime=nvidia
      --gpus '"device=${env.LLM_DEVICE_ID_1},${env.LLM_DEVICE_ID_2}"'
      --network llm-network
      --name vllm-${PORT}
      -v ${env.HF_HOME}:/root/.cache/huggingface
      vllm/vllm-openai:latest
      --model Qwen/Qwen3.6-35B-A3B-FP8
      --host 0.0.0.0
      --port ${PORT}
      --tensor-parallel-size 2
      --enable-chunked-prefill
      --max-model-len 65536
      --gpu-memory-utilization 0.90
      --reasoning-parser qwen3
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --speculative-config '{"method":"qwen3_next_mtp","num_speculative_tokens":1}'
      --enable-prefix-caching
      --cpu-offload-gb 6
      --max-num-seqs 1
      --kv-cache-dtype fp8_e4m3
      --max-num-batched-tokens 32768
      --disable-custom-all-reduce
    cmdStop: "docker stop vllm-${PORT} || true"
    proxy: http://vllm-${PORT}:${PORT}
    type: proxy

  "nomic-ai/nomic-embed-text-v1.5":
    checkEndpoint: /v1/models
    cmd: >
      docker run --rm --runtime=nvidia
      --gpus "device=${env.INDEXER_STORAGE_DEVICE_ID}"
      --network llm-network
      --name vllm-${PORT}
      -v ${env.HF_HOME}:/root/.cache/huggingface
      vllm/vllm-openai:latest
      --model nomic-ai/nomic-embed-text-v1.5
      --host 0.0.0.0
      --port ${PORT}
      --max-model-len 2048
      --gpu-memory-utilization 0.25
      --trust-remote-code
    cmdStop: "docker stop vllm-${PORT} || true"
    proxy: http://vllm-${PORT}:${PORT}
    type: proxy
